<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header class="toggle-shell">
        <div class="mode-tabs">
          <button id="mode-general" class="mode-tab active" type="button">일반 모드</button>
          <button id="mode-clean" class="mode-tab" type="button">클린 모드</button>
          <div class="mode-indicator"></div>
        </div>
        <input type="checkbox" id="service-onoff" checked hidden />
      </header>

      <section class="filter-settings">
        <div class="filter-item">
          <span class="step-label">1단계 (Blur)</span>
          <label class="switch">
            <input type="radio" name="filterStep" value="1" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="filter-item">
          <span class="step-label">2단계 (Emoji)</span>
          <label class="switch">
            <input type="radio" name="filterStep" value="2" />
            <span class="slider"></span>
          </label>
        </div>
        <div class="filter-item">
          <span class="step-label">3단계 (Refined)</span>
          <label class="switch">
            <input type="radio" name="filterStep" value="3" checked />
            <span class="slider"></span>
          </label>
        </div>
      </section>

      <section class="statistics-card">
        <div class="stats-info">
          <h4>Statistics</h4>
          <p>전체 댓글 : <span id="total-count">120</span></p>
          <p>감지된 악플 : <span id="toxic-count" class="highlight">15</span> (12.5%)</p>
        </div>
        <div class="stats-chart">
          <div class="pie-chart"><span>15</span></div>
        </div>
      </section>

      <section class="personal-settings">
        <div class="section-header">
          <h4>나만의 키워드 설정</h4>
        </div>
        <div class="keyword-input-group">
          <input type="text" id="keyword-input" placeholder="차단할 단어 입력" />
          <button id="add-keyword">추가</button>
        </div>
        <div id="keyword-tags" class="tag-container">
          <span class="tag">주작 ✕</span>
          <span class="tag">광고 ✕</span>
        </div>
      </section>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
